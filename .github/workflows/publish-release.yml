name: Publish release

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: Ref to publish manually
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  tag:
    uses: AdGuardSoftwareLimited/actions/.github/workflows/tag-from-changelog.yml@master
    with:
      ref: ${{ inputs.ref || github.event.pull_request.merge_commit_sha || github.ref_name }}
      team: extensions

  test:
    name: Lint, test, build
    needs: tag
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.event.pull_request.merge_commit_sha || github.ref_name }}

      - name: Inject version into package.json
        run: npm pkg set version="${{ needs.tag.outputs.version }}"

      - name: Build and test via Docker
        run: DOCKER_BUILDKIT=1 docker build --progress plain --target test-output .

  build:
    name: Build
    needs: [tag, test]
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.event.pull_request.merge_commit_sha || github.ref_name }}

      - name: Inject version into package.json
        run: npm pkg set version="${{ needs.tag.outputs.version }}"

      - name: Build release artifacts
        run: |
          set -euo pipefail
          DOCKER_BUILDKIT=1 docker build --progress plain --target build-output --output ./artifacts .
          ls -la ./artifacts/

      - name: Upload npm package
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: artifacts/translate.tgz

  publish:
    needs: build
    uses: AdGuardSoftwareLimited/actions/.github/workflows/deploy-to-npm.yml@master
    with:
      artifact-name: npm-package
      package-file: translate.tgz
      environment: extensions
    permissions:
      contents: read
      id-token: write

  mirror-and-release:
    needs: [tag, publish]
    uses: AdGuardSoftwareLimited/actions/.github/workflows/mirror-and-release.yml@master
    with:
      team: extensions
      target_repo: AdguardTeam/translate
      tag: ${{ needs.tag.outputs.tag }}
      changelog: ${{ needs.tag.outputs.changelog }}
      artifact_name: npm-package
    secrets: inherit
    permissions:
      contents: write
      id-token: write

  notify:
    name: Notify
    needs: [tag, mirror-and-release]
    if: needs.mirror-and-release.result == 'success'
    runs-on: team-extensions
    steps:
      - name: Send Slack notification
        uses: AdGuardSoftwareLimited/actions/actions/slack@master
        with:
          channel: '#adguard-extension-vcs'
          message: ':white_check_mark: *@adguard/translate* *v${{ needs.tag.outputs.version }}* published to npm — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>'
          color: good
