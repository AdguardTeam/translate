name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build release artifacts
        run: |
          docker build --progress plain --target build-output --output ./artifacts .
          ls -la ./artifacts/

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: artifacts/artifacts/translate.tgz

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    container: node:22
    environment: extensions
    steps:
      - name: Download npm package
        uses: actions/download-artifact@v8
        with:
          name: npm-package

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish translate.tgz --access public --dry-run
        env:
          NPM_CONFIG_PROVENANCE: false
