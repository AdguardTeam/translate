name: Release

on:
  push:
    tags:
      - 'v*'

# For Trusted Publishing
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version from tag
        run: npm version --no-git-tag-version "${GITHUB_REF#refs/tags/v}"

      - name: Build release artifacts
        run: |
          docker build --progress plain --target build-output --output ./artifacts .
          ls -la ./artifacts/

      - name: Upload npm package
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: artifacts/translate.tgz

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    # Trusted publishing requires npm CLI version 11.5.1 or later
    # and Node version 22.14.0 or higher.
    container: node:24
    environment: extensions
    steps:
      - name: Download npm package
        uses: actions/download-artifact@v8
        with:
          name: npm-package

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      # FIXME: Remove check for tag after testing release.
      # FIXME: Remove --dry-run after testing release.
      # npm requires --tag for prerelease versions (e.g. v2.0.6-beta.1),
      # otherwise they would be published as 'latest'.
      - name: Publish to npm
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if echo "$VERSION" | grep -q '-'; then
            npm publish translate.tgz --access public --tag next --dry-run
          else
            npm publish translate.tgz --access public --dry-run
          fi
        env:
          NPM_CONFIG_PROVENANCE: false
