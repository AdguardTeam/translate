name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: team-extensions
    environment: extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build release artifacts
        run: |
          docker build --progress plain --target build-output --output ./artifacts .
          ls -la ./artifacts/

      - name: Publish to npm (dry run)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          docker run --rm \
            -v "$PWD:/workdir" \
            -e NODE_AUTH_TOKEN \
            adguard/node-ssh:22.17--0 \
            sh -c 'npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN" && npm publish /workdir/artifacts/artifacts/translate.tgz --access public --dry-run'
