name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  pull_request:
    branches:
      - '*'

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    uses: AdGuardSoftwareLimited/actions/.github/workflows/lint.yml@master
    with:
      runs-on: '["team-mobile"]'
      prepare-script: npm install
      lint-command: 'npm run lint'
