name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  YARN_FLAGS: '${{ vars.YARN_FLAGS || '''' }}'

jobs:
  test:
    name: Lint, test, build
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and test via Docker
        run: docker build --progress plain --target test-output --build-arg "YARN_FLAGS=${YARN_FLAGS}" .
