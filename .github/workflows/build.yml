name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  test:
    name: Lint, test, build
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and test via Docker
        run: docker build --progress plain --target test-output .
