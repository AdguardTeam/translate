name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  pull_request:
    branches:
      - '*'

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint
    uses: AdGuardSoftwareLimited/actions/.github/workflows/lint.yml@master
    with:
      runs-on: '["team-extensions"]'
      container-image: 'docker.io/adguard/node-ssh:22.22--0'
      prepare-script: 'yarn install --frozen-lockfile'
      lint-command: 'yarn lint'
