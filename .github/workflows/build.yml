name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  pull_request:
    branches:
      - '*'

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint
    uses: AdGuardSoftwareLimited/actions/.github/workflows/lint.yml@master
    with:
      runs-on: '["team-extensions"]'
      prepare-script: |
        curl -fsSL https://nodejs.org/dist/v22.17.0/node-v22.17.0-linux-x64.tar.xz | tar -xJ -C /tmp
        echo "/tmp/node-v22.17.0-linux-x64/bin" >> "$GITHUB_PATH"
        corepack enable
        yarn install --frozen-lockfile
      lint-command: 'yarn lint'

  test:
    name: Test
    needs: lint
    uses: AdGuardSoftwareLimited/actions/.github/workflows/junit-tests.yml@master
    secrets: inherit
    with:
      runs-on: '["team-extensions"]'
      prepare-script: |
        curl -fsSL https://nodejs.org/dist/v22.17.0/node-v22.17.0-linux-x64.tar.xz | tar -xJ -C /tmp
        echo "/tmp/node-v22.17.0-linux-x64/bin" >> "$GITHUB_PATH"
        corepack enable
        yarn install --frozen-lockfile
      test-command: 'yarn test'
      results-path: 'test-results/junit.xml'
