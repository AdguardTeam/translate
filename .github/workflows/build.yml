name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint
    uses: AdGuardSoftwareLimited/actions/.github/workflows/lint.yml@master
    with:
      runs-on: '["team-extensions"]'
      lint-command: 'yarn lint'
