name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  YARN_FLAGS: '${{ vars.YARN_FLAGS || '''' }}'

jobs:
  lint:
    name: Lint
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: yarn install --frozen-lockfile ${{ env.YARN_FLAGS }}

      - name: Run linters
        run: yarn lint

  test:
    name: Test
    needs: lint
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: yarn install --frozen-lockfile ${{ env.YARN_FLAGS }}

      - name: Run tests
        run: yarn test

  build:
    name: Build
    needs: test
    runs-on: team-extensions
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: yarn install --frozen-lockfile ${{ env.YARN_FLAGS }}

      - name: Build
        run: yarn build
