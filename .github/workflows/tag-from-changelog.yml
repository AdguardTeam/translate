name: Tag from Changelog

# Tags the merge commit when a release PR (created by tag.yml /
# create-release-pr.yml) is merged. Reads the latest released version
# from CHANGELOG.md and creates the matching v{version} tag.
#
# The tag push triggers release.yml to build, publish, and release.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  tag:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release-bump/')
    uses: AdGuardSoftwareLimited/actions/.github/workflows/tag-from-changelog.yml@master
    with:
      ref: ${{ github.event.pull_request.merge_commit_sha }}
      team: extensions
